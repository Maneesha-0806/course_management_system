<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AcademiaX</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-body p-4 p-sm-5 bg-white">
                        
                        <div class="text-center mb-4">
                            <div class="d-inline-flex p-3 bg-primary bg-opacity-10 text-primary rounded-circle mb-3">
                                <i class="fa-solid fa-lock-open fa-2x"></i>
                            </div>
                            <h2 class="fw-bold mb-1">Set New Password</h2>
                            <p class="text-muted">Please choose a strong, secure password that you don't use anywhere else.</p>
                        </div>

                        <div id="authAlert" class="alert d-none" role="alert"></div>

                        <form id="resetPasswordForm" novalidate>
                            
                            <div class="mb-3">
                                <label for="newPassword" class="form-label small fw-semibold">New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted">
                                        <i class="fa-solid fa-lock"></i>
                                    </span>
                                    <input type="password" id="newPassword" class="form-control bg-light border-start-0" placeholder="Minimum 8 characters" required minlength="8">
                                    <button class="btn btn-light border border-start-0 text-muted toggle-password" type="button" data-target="newPassword">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                    <div class="invalid-feedback">Password must be at least 8 characters long.</div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label small fw-semibold">Confirm New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted">
                                        <i class="fa-solid fa-circle-check"></i>
                                    </span>
                                    <input type="password" id="confirmPassword" class="form-control bg-light border-start-0" placeholder="Repeat your new password" required>
                                    <button class="btn btn-light border border-start-0 text-muted toggle-password" type="button" data-target="confirmPassword">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                    <div class="invalid-feedback" id="confirmFeedback">Passwords must match exactly.</div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2.5 fw-medium rounded-3 mb-3">
                                <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true" id="resetSpinner"></span>
                                Update Security Password
                            </button>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    
    <script src="../js/auth.js"></script>
    
    <script>
        // Password visibility toggler framework
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const inputField = document.getElementById(targetId);
                const icon = this.querySelector('i');
                
                if (inputField.type === 'password') {
                    inputField.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    inputField.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });
        });

        // Client-side execution match interceptor
        const form = document.getElementById('resetPasswordForm');
        const newPass = document.getElementById('newPassword');
        const confirmPass = document.getElementById('confirmPassword');

        form.addEventListener('submit', function(event) {
            if (newPass.value !== confirmPass.value) {
                confirmPass.setCustomValidity('Mismatch');
                document.getElementById('confirmFeedback').innerText = "Passwords do not match!";
            } else {
                confirmPass.setCustomValidity('');
            }

            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            form.classList.add('was-validated');
        });

        // Clear custom validity flag upon structural text manipulation
        confirmPass.addEventListener('input', function() {
            if (newPass.value === confirmPass.value) {
                confirmPass.setCustomValidity('');
            }
        });
    </script>
</body>
</html>
