<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - AcademiaX</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                
                <div class="mb-3">
                    <a href="../index.html" class="text-decoration-none text-muted small">
                        <i class="fa-solid fa-arrow-left me-1"></i> Back to Homepage
                    </a>
                </div>

                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-body p-4 p-sm-5 bg-white">
                        
                        <div class="text-center mb-4">
                            <h2 class="fw-bold mb-1">Student Portal</h2>
                            <p class="text-muted">Welcome back! Sign in to track your learning milestones.</p>
                        </div>

                        <div id="authAlert" class="alert d-none" role="alert"></div>

                        <form id="studentLoginForm" novalidate>
                            
                            <div class="mb-3">
                                <label for="studentEmail" class="form-label small fw-semibold">Academic Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted">
                                        <i class="fa-solid fa-envelope"></i>
                                    </span>
                                    <input type="email" id="studentEmail" class="form-control bg-light border-start-0" placeholder="student@university.edu" required>
                                    <div class="invalid-feedback">Please enter a valid institutional email address.</div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <label for="studentPassword" class="form-label small fw-semibold mb-0">Password</label>
                                    <a href="forgot-password.html" class="text-decoration-none small text-primary">Forgot Password?</a>
                                </div>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted">
                                        <i class="fa-solid fa-lock"></i>
                                    </span>
                                    <input type="password" id="studentPassword" class="form-control bg-light border-start-0" placeholder="Enter your password" required>
                                    <button class="btn btn-light border border-start-0 text-muted" type="button" id="togglePassword">
                                        <i class="fa-solid fa-eye" id="passwordIcon"></i>
                                    </button>
                                    <div class="invalid-feedback">Password field cannot be empty.</div>
                                </div>
                            </div>

                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label small text-muted user-select-none" href="#rememberMe" for="rememberMe">Remember my profile session</label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2.5 fw-medium rounded-3 mb-3">
                                <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true" id="loginSpinner"></span>
                                Log In
                            </button>

                            <div class="text-center">
                                <p class="text-muted small mb-0">
                                    New to the platform? <a href="student-register.html" class="text-primary text-decoration-none fw-medium">Create a Student Account</a>
                                </p>
                            </div>
                        </form>

                    </div>
                </div>

                <div class="text-center mt-4">
                    <p class="text-muted small">
                        Are you an educator? <a href="admin-login.html" class="fw-semibold text-secondary text-decoration-none">Access Administrator Console <i class="fa-solid fa-arrow-right-to-bracket ms-0.5"></i></a>
                    </p>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    
    <script src="../js/auth.js"></script>
    
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordField = document.getElementById('studentPassword');
            const icon = document.getElementById('passwordIcon');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordField.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // Basic front-end form interceptor layout validation pipeline
        const form = document.getElementById('studentLoginForm');
        form.addEventListener('submit', function(event) {
            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            form.classList.add('was-validated');
        });
    </script>
</body>
</html>
