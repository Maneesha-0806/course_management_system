<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AcademiaX</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-body p-4 p-sm-5 bg-white">
                        
                        <div class="text-center mb-4">
                            <div class="d-inline-flex p-3 bg-primary bg-opacity-10 text-primary rounded-circle mb-3">
                                <i class="fa-solid fa-key-skeleton fa-2x"></i>
                            </div>
                            <h2 class="fw-bold mb-1">Recover Password</h2>
                            <p class="text-muted">Enter your registered email address below and we'll send you instructions to reset your security credentials.</p>
                        </div>

                        <div id="authAlert" class="alert d-none" role="alert"></div>

                        <form id="forgotPasswordForm" novalidate>
                            
                            <div class="mb-4">
                                <label for="recoveryEmail" class="form-label small fw-semibold">Account Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted">
                                        <i class="fa-solid fa-envelope"></i>
                                    </span>
                                    <input type="email" id="recoveryEmail" class="form-control bg-light border-start-0" placeholder="name@university.edu" required>
                                    <div class="invalid-feedback">Please enter a valid account email handle.</div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2.5 fw-medium rounded-3 mb-3">
                                <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true" id="recoverySpinner"></span>
                                Send Reset Instructions
                            </button>

                            <div class="text-center mt-3">
                                <a id="backToLoginLink" href="student-login.html" class="text-primary text-decoration-none small fw-medium">
                                    <i class="fa-solid fa-arrow-left me-1"></i> Return to Login
                                </a>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    
    <script src="../js/auth.js"></script>
    
    <script>
        // Check where the user arrived from to customize the return flow
        const referrer = document.referrer;
        const backLink = document.getElementById('backToLoginLink');

        if (referrer.includes('admin-login.html')) {
            backLink.href = 'admin-login.html';
            backLink.innerHTML = '<i class="fa-solid fa-arrow-left me-1"></i> Return to Admin Portal';
            backLink.className = 'text-dark text-decoration-none small fw-bold'; // Swap to admin theme color
        }

        const form = document.getElementById('forgotPasswordForm');
        form.addEventListener('submit', function(event) {
            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            form.classList.add('was-validated');
        });
    </script>
</body>
</html>
